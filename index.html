// Supabase HTTP helper — no SDK needed, works directly with the REST API
const db = {
  async select(table, options={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    if(options.order) url += `order=${options.order}&`;
    url += 'select=*';
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    const result = await res.json();
    return result[0];
  },
  async update(table, data, match) {
    const [col, val] = Object.entries(match)[0];
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${val}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  }
};

// ─── Storage ──────────────────────────────────────────────────────────────────
function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = sessionStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = v => { const next = typeof v==="function"?v(val):v; setVal(next); try { sessionStorage.setItem(key,JSON.stringify(next)); } catch {} };
  return [val, set];
}

// ─── Micro Components ─────────────────────────────────────────────────────────
function Toast({msg,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2600); return ()=>clearTimeout(t); },[]);
  return <div style={css.toast}>{msg}</div>;
}

function ProgressBar({pct,color=G.accent,height=5}) {
  return (
    <div style={{height,borderRadius:4,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
      <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:4}}/>
    </div>
  );
}

function ProofUpload({proofs,onChange,required}) {
  const ref = useRef();
  const handle = files => Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>onChange([...proofs,{url:e.target.result,name:f.name,type:f.type}]);
    r.readAsDataURL(f);
  });
  return (
    <div>
      <div style={{fontSize:12,color:G.muted,marginBottom:8}}>{required?"📸 Photo proof required for Volunteer goals":"📸 Attach proof (optional)"}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {proofs.map((p,i)=>(
          <div key={i} style={{position:"relative"}}>
            {p.type&&p.type.startsWith("image")?
              <img src={p.url} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:10,border:`2px solid ${G.border}`}}/>:
              <div style={{width:76,height:76,background:G.faint,borderRadius:10,border:`2px solid ${G.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:G.muted,textAlign:"center",padding:4}}>📄 {p.name}</div>}
            <button onClick={()=>onChange(proofs.filter((_,j)=>j!==i))}
              style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>×</button>
          </div>
        ))}
        <div onClick={()=>ref.current.click()} style={{border:"2px dashed rgba(74,222,128,0.25)",borderRadius:14,padding:"22px 16px",textAlign:"center",cursor:"pointer",background:"rgba(74,222,128,0.03)",minWidth:76}}>

      <input ref={ref} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>
    </div>
  );
}

// ─── Photo Upload Component ───────────────────────────────────────────────────
function PhotoUpload({member,onUpdate}) {
  const ref = useRef();
  const [uploading,setUploading] = useState(false);
  const handle = async(file) => {
    if(!file) return;
    setUploading(true);
    const r = new FileReader();
    r.onload = async(e) => {
      const dataUrl = e.target.result;
      try {
        await db.update("members",{photo_url:dataUrl},{id:member.id});
        if(onUpdate) onUpdate(member.id, dataUrl);
      } catch(err) { alert("Photo upload failed: "+err.message); }
      setUploading(false);
    };
    r.readAsDataURL(file);
  };
  return (
    <div style={{marginTop:6}}>
      <button onClick={()=>ref.current.click()} style={{fontSize:10,color:G.accent,background:"rgba(56,189,248,0.1)",border:`1px solid rgba(56,189,248,0.2)`,borderRadius:8,padding:"3px 8px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
        {uploading?"Uploading...":"📷 Photo"}
      </button>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

  const done=goals.filter(g=>g.status==="completed").length;
  const avgBook=Math.round(members.filter(m=>m.role==="member").reduce((s,m)=>s+m.bookPct,0)/members.filter(m=>m.role==="member").length);
  const displayed=filter==="all"?goals:goals.filter(g=>g.status===filter);
  const displayedApps=appFilter==="all"?apps:apps.filter(a=>a.status===appFilter);
  const statusColor={pending:"#fb923c",approved:G.accent,declined:"#f87171"};
  const statusBg={pending:"rgba(251,146,60,0.1)",approved:"rgba(74,222,128,0.1)",declined:"rgba(248,113,113,0.1)"};
  const initials=n=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const adminTabs=[{id:"dashboard",label:"📊 Dashboard"},{id:"goals",label:"🎯 Goals"},{id:"apps",label:`📋 Applications${apps.filter(a=>a.status==="pending").length>0?" ("+apps.filter(a=>a.status==="pending").length+")":""}`},{id:"nudges",label:"📲 Nudges"}];
  return (
    <div style={css.body}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      {viewGoal&&(
        <div style={css.overlay} onClick={()=>setViewGoal(null)}>
          <div style={css.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:10,color:G.accent,letterSpacing:"2px",textTransform:"uppercase",marginBottom:6}}>Goal Detail</div>
            <div style={{fontSize:19,fontWeight:800,marginBottom:4}}>{viewGoal.title}</div>
            <div style={{color:G.muted,fontSize:13,marginBottom:14}}>{members.find(m=>m.id===viewGoal.memberId)&&members.find(m=>m.id===viewGoal.memberId).name} · Due {viewGoal.due}</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <span style={css.catBadge(viewGoal.category)}>{(CATEGORY_META[viewGoal.category]||{}).icon} {viewGoal.category}</span>
              <span style={css.statusBadge(viewGoal.status)}>{STATUS_META[viewGoal.status].icon} {STATUS_META[viewGoal.status].label}</span>
            </div>
            {viewGoal.note&&<div style={{background:G.faint,borderRadius:10,padding:"10px 14px",fontSize:13,color:G.muted,marginBottom:14,fontStyle:"italic"}}>"{viewGoal.note}"</div>}
            {viewGoal.proofs&&viewGoal.proofs.length>0?(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:G.muted,marginBottom:8,fontWeight:600}}>PROOF</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {viewGoal.proofs.map((p,i)=>p.type&&p.type.startsWith("image")?
                    <img key={i} src={p.url} alt="" style={{width:110,height:110,objectFit:"cover",borderRadius:12,border:`2px solid ${G.border}`}}/>:
                    <div key={i} style={{width:110,height:110,background:G.faint,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:G.muted,textAlign:"center",padding:8}}>📄 {p.name}</div>
                  )}
                </div>
              </div>
            ):<div style={{color:G.muted,fontSize:13,marginBottom:14}}>No proof submitted.</div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button style={css.btn("ghost")} onClick={()=>setViewGoal(null)}>Close</button>
              <button style={{...css.btn("primary"),background:"rgba(239,68,68,0.15)",color:"#f87171"}} onClick={()=>{onUpdateGoal({...viewGoal,status:"at-risk"});setViewGoal(null);setToast("⚠ Flagged");}}>⚠ Flag</button>
              <button style={css.btn("primary")} onClick={()=>{onUpdateGoal({...viewGoal,status:"completed"});setViewGoal(null);setToast("✓ Approved!");}}>✓ Approve</button>
            </div>
          </div>
        </div>
      )}
      {viewApp&&(
        <div style={css.overlay} onClick={()=>{setViewApp(null);setPin("");}}>
          <div style={css.modal} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:20}}>
              <div style={{...css.avatar(COLORS_POOL[viewApp.id.length%COLORS_POOL.length],48)}}>{initials(viewApp.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:20,fontWeight:800}}>{viewApp.name}</div>
                <div style={{fontSize:13,color:G.muted}}>{viewApp.city} · Age {viewApp.age}</div>
              </div>
              <span style={{fontSize:11,padding:"4px 12px",borderRadius:20,fontWeight:700,background:statusBg[viewApp.status],color:statusColor[viewApp.status]}}>{viewApp.status.toUpperCase()}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[{l:"Email",v:viewApp.email},{l:"WhatsApp",v:viewApp.whatsapp},{l:"Applied",v:viewApp.appliedAt},{l:"Referred by",v:viewApp.referral||"—"}].map((r,i)=>(
                <div key={i} style={{background:G.faint,borderRadius:10,padding:"10px 14px"}}>
                  <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>{r.l}</div>
                  <div style={{fontSize:13,fontWeight:700,marginTop:3}}>{r.v}</div>
                </div>
              ))}
            </div>
            <div style={{background:G.surface2,border:`1px solid ${G.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
              <div style={{fontSize:10,color:G.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>Why They Want to Join</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.7}}>{viewApp.why}</div>
            </div>
            <div style={{background:G.surface2,border:`1px solid ${G.border}`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{fontSize:10,color:G.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>Their Goals</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{viewApp.goals}</div>
            </div>
            {viewApp.status==="pending"&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:G.muted,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>Assign Login PIN (4 digits)</div>
                <input style={{...css.input,maxWidth:160}} maxLength={4} placeholder="e.g. 5678" value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))}/>
                <div style={{fontSize:11,color:G.muted,marginTop:4}}>Send this PIN to the member via WhatsApp.</div>
              </div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button style={css.btn("ghost")} onClick={()=>{setViewApp(null);setPin("");}}>Close</button>
              {viewApp.status==="pending"&&<>
                <button style={{...css.btn(),background:"rgba(248,113,113,0.1)",color:"#f87171"}} onClick={()=>{onDecideApp(viewApp.id,"declined","");setViewApp(null);setPin("");setToast("❌ Declined.");}}>✗ Decline</button>
                <button style={{...css.btn("primary"),opacity:pin.length===4?1:0.4}} onClick={()=>{if(pin.length===4){onDecideApp(viewApp.id,"approved",pin);setViewApp(null);setPin("");setToast(`✅ ${viewApp.name} approved!`);}}}>
                  {pin.length===4?"✓ Approve →":"Enter PIN first"}
                </button>
              </>}
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:6,marginBottom:22,background:"rgba(255,255,255,0.03)",borderRadius:14,padding:4,overflowX:"auto"}}>
        {adminTabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...css.navItem(tab===t.id),borderRadius:10,padding:"8px 14px",fontSize:12,flexShrink:0}}>{t.label}</button>
        ))}
      </div>
      {tab==="dashboard"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
            {[{label:"Members",val:members.filter(m=>m.role==="member").length,icon:"👥"},{label:"Goals Done",val:`${done}/${goals.length}`,icon:"✅"},{label:"Avg Book",val:`${avgBook}%`,icon:"📗"},{label:"Pending Apps",val:apps.filter(a=>a.status==="pending").length,icon:"📋"}].map((s,i)=>(
              <div key={i} style={{...css.card,textAlign:"center"}}>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{fontSize:24,fontWeight:800,color:G.accent}}>{s.val}</div>
                <div style={{fontSize:11,color:G.muted}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={css.card}>
            <div style={css.cardTitle}>Member Overview</div>
            {members.filter(m=>m.role==="member").map(m=>{
              const mg=goals.filter(g=>g.memberId===m.id);
              const d=mg.filter(g=>g.status==="completed").length;
              return (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${G.border}`}}>
                  {m.photo_url ? <img src={m.photo_url} alt={m.avatar} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",border:`2px solid ${m.color}`,flexShrink:0}}/> : <div style={css.avatar(m.color,36)}>{m.avatar}</div>}
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{m.name}</div>
                    <div style={{fontSize:11,color:G.muted}}>🔥 {m.streak}d · 📖 {m.bookPct}%</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:700,color:G.accent}}>{d}/{mg.length}</div>
                    <div style={{width:80,marginTop:4}}><ProgressBar pct={mg.length?d/mg.length*100:0}/></div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
      {tab==="goals"&&(
        <div style={css.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={css.cardTitle}>All Goals</div>
            <div style={{display:"flex",gap:6}}>
              {["all","completed","on-track","at-risk"].map(f=>(
                <button key={f} onClick={()=>setFilter(f)} style={{padding:"4px 11px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,fontWeight:700,background:filter===f?G.accent:"rgba(255,255,255,0.06)",color:filter===f?G.bg:G.muted}}>
                  {f==="all"?"All":STATUS_META[f]&&STATUS_META[f].label}
                </button>
              ))}
            </div>
          </div>
          {displayed.map(g=>{
            const m=members.find(x=>x.id===g.memberId);
            return (
              <div key={g.id} style={css.goalCard} onClick={()=>setViewGoal(g)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",flex:1}}>
                    {m&&<div style={css.avatar(m.color,28)}>{m.avatar}</div>}
                    <div>
                      <div style={{fontSize:13,fontWeight:700}}>{g.title}</div>
                      <div style={{display:"flex",gap:8,marginTop:3}}>
                        <span style={css.catBadge(g.category)}>{(CATEGORY_META[g.category]||{}).icon} {g.category}</span>
                        {m&&<span style={{fontSize:11,color:G.muted}}>{m.name}</span>}
                        {g.proofs&&g.proofs.length>0&&<span style={{fontSize:11,color:"#60a5fa"}}>📸 {g.proofs.length}</span>}
                      </div>
                    </div>
                  </div>
                  <span style={css.statusBadge(g.status)}>{STATUS_META[g.status].icon} {STATUS_META[g.status].label}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {tab==="apps"&&(
        <div>
          <div style={{display:"flex",gap:6,marginBottom:16,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:4}}>
            {["all","pending","approved","declined"].map(f=>(
              <button key={f} onClick={()=>setAppFilter(f)} style={{flex:1,padding:"8px",borderRadius:9,border:"none",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,fontWeight:800,background:appFilter===f?G.accent:"transparent",color:appFilter===f?G.bg:G.muted}}>
                {f.charAt(0).toUpperCase()+f.slice(1)}
              </button>
            ))}
          </div>
          {displayedApps.map(app=>(
            <div key={app.id} onClick={()=>setViewApp(app)} style={{...css.card,marginBottom:12,cursor:"pointer",display:"flex",gap:14,alignItems:"center"}}>
              <div style={{...css.avatar(COLORS_POOL[app.id.length%COLORS_POOL.length],40)}}>{app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:15}}>{app.name}</div>
                <div style={{fontSize:12,color:G.muted,marginTop:2}}>{app.city} · {app.occupation||"—"} · Applied {app.appliedAt}</div>
              </div>
              <span style={{fontSize:11,padding:"3px 12px",borderRadius:20,fontWeight:800,background:statusBg[app.status],color:statusColor[app.status]}}>{app.status.toUpperCase()}</span>
            </div>
          ))}
        </div>
      )}
      {tab==="nudges"&&<NudgesTab members={members} goals={goals}/>}
    </div>
  );
}

// ─── Onboarding Flow ──────────────────────────────────────────────────────────
function OnboardingFlow({onSubmit,onBack}) {
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({name:"",email:"",whatsapp:"",city:"",age:"",occupation:"",why:"",referral:"",goals:"",commitment:""});
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const G2={bg:"#0a0d08",surface:"#111a0e",border:"rgba(234,115,31,0.15)",accent:"#ea731f",text:"#f0ede8",muted:"#7a8a6a",faint:"#161f10"};
  const inp={width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${G2.border}`,borderRadius:10,color:G2.text,padding:"11px 14px",fontSize:14,fontFamily:"'Plus Jakarta Sans',sans-serif",boxSizing:"border-box",outline:"none"};
  const steps=["Welcome","About You","Your Why","Your Goals","Review"];
  if(done) return (
    <div style={{minHeight:"100vh",background:G2.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",textAlign:"center",padding:24,fontFamily:"'Plus Jakarta Sans',sans-serif",color:G2.text}}>
      <div style={{fontSize:60,marginBottom:16}}>🎉</div>
      <div style={{fontSize:26,fontWeight:800,marginBottom:10}}>Application Submitted!</div>
      <div style={{fontSize:15,color:G2.muted,maxWidth:400,lineHeight:1.7,marginBottom:28}}>Thanks <strong style={{color:G2.accent}}>{form.name.split(" ")[0]}</strong>! The VOA admin will review your application and send your login PIN to <strong style={{color:G2.accent}}>{form.email}</strong> and on WhatsApp within 48 hours.</div>
      <button onClick={onBack} style={{background:G2.accent,color:"#fff",border:"none",padding:"12px 28px",borderRadius:12,fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>← Back to Portal</button>
    </div>
  );
  return (
    <div style={{minHeight:"100vh",background:G2.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px",fontFamily:"'Plus Jakarta Sans',sans-serif",color:G2.text}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"3px",color:G2.accent,textTransform:"uppercase",marginBottom:6}}>Volunteers Organization Africa</div>
        <img src={LOGO_URL} alt="VOA" style={{height:60,marginBottom:10,filter:"brightness(0.1) saturate(1) invert(1) sepia(1) saturate(3) hue-rotate(80deg)",opacity:0.95}}/>
        <div style={{fontSize:30,fontWeight:800}}>Join REP</div>
      </div>
      {step>0&&step<5&&(
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:28}}>
          {steps.slice(1).map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center"}}>
              <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,
                background:step>i+1?G2.accent:step===i+1?G2.accent:"transparent",
                border:`2px solid ${step>=i+1?G2.accent:"rgba(96,165,250,0.2)"}`,
                color:step>=i+1?"#06080a":G2.muted}}>{step>i+1?"✓":i+1}</div>
              {i<steps.length-2&&<div style={{width:24,height:2,background:step>i+1?G2.accent:"rgba(96,165,250,0.15)",margin:"0 3px"}}/>}
            </div>
          ))}
        </div>
      )}
      <div style={{background:G2.surface,border:`1px solid ${G2.border}`,borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:520}}>
        {step===0&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:14}}>🌊</div>
            <div style={{fontSize:24,fontWeight:800,marginBottom:10}}>Ripple Effect Program</div>
            <div style={{fontSize:14,color:G2.muted,lineHeight:1.7,marginBottom:24}}>A small accountability group inside VOA. Commit to goals, read books together, and show up for the community.</div>
            <button onClick={()=>setStep(1)} style={{background:G2.accent,color:"#fff",border:"none",padding:"13px 36px",borderRadius:12,fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Apply Now →</button>
          </div>
        )}
        {step===1&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>About You</div>
            {[{k:"name",l:"Full Name",p:"e.g. Amara Osei"},{k:"email",l:"Email",p:"you@email.com"},{k:"whatsapp",l:"WhatsApp Number",p:"+234 801 234 5678"},{k:"city",l:"City",p:"e.g. Lagos"},{k:"age",l:"Age",p:"e.g. 25",t:"number"},{k:"occupation",l:"Occupation",p:"e.g. Student, Developer…"}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>{f.l}</div>
                <input style={inp} type={f.t||"text"} placeholder={f.p} value={form[f.k]} onChange={e=>set(f.k,e.target.value)}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={()=>setStep(0)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(2)} disabled={!form.name||!form.email||!form.whatsapp||!form.city} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:(form.name&&form.email&&form.whatsapp&&form.city)?1:0.4}}>Continue →</button>
            </div>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Your Why</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>Why do you want to join REP? <span style={{color:"#f87171"}}>*</span></div>
            <textarea style={{...inp,resize:"vertical",marginBottom:4}} rows={5} placeholder="What drew you to REP? What do you hope to give and gain?" value={form.why} onChange={e=>set("why",e.target.value)}/>
            <div style={{fontSize:11,color:form.why.length>=40?G2.accent:G2.muted,textAlign:"right",marginBottom:14}}>{form.why.length} chars {form.why.length>=40?"✓":"(need 40+)"}</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>How did you hear about us?</div>
            <input style={{...inp,marginBottom:16}} placeholder="e.g. Friend referral, Instagram…" value={form.referral} onChange={e=>set("referral",e.target.value)}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(3)} disabled={form.why.length<40} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:form.why.length>=40?1:0.4}}>Continue →</button>
            </div>
          </div>
        )}
        {step===3&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Your Goals</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>List 2–4 goals for this cohort <span style={{color:"#f87171"}}>*</span></div>
            <textarea style={{...inp,resize:"vertical",marginBottom:14}} rows={6} placeholder={"1. Read 1 book per month\n2. Volunteer 8 hours/month\n3. Wake up at 6am daily"} value={form.goals} onChange={e=>set("goals",e.target.value)}/>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>I commit to showing up weekly <span style={{color:"#f87171"}}>*</span></div>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {[{v:"yes",l:"✅ Yes, I commit"},{v:"no",l:"❌ Not sure yet"}].map(o=>(
                <button key={o.v} onClick={()=>set("commitment",o.v)} style={{flex:1,padding:"11px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,
                  border:`1.5px solid ${form.commitment===o.v?G2.accent:"rgba(96,165,250,0.2)"}`,background:form.commitment===o.v?"rgba(96,165,250,0.1)":"transparent",color:form.commitment===o.v?G2.accent:G2.muted}}>{o.l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(4)} disabled={!form.goals||form.commitment!=="yes"} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:(form.goals&&form.commitment==="yes")?1:0.4}}>Review →</button>
            </div>
          </div>
        )}
        {step===4&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Review & Submit</div>
            {[{l:"Name",v:form.name},{l:"Email",v:form.email},{l:"WhatsApp",v:form.whatsapp},{l:"City",v:form.city},{l:"Age",v:form.age}].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
                <span style={{fontSize:12,color:G2.muted,fontWeight:600}}>{r.l}</span>
                <span style={{fontSize:13,fontWeight:700}}>{r.v}</span>
              </div>
            ))}
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginTop:14,marginBottom:14}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>WHY JOINING</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.6}}>{form.why}</div>
            </div>
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginBottom:18}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>GOALS</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{form.goals}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(3)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={async()=>{
                setSubmitting(true);
                try {
                  await onSubmit({...form});
                  setDone(true);
                } catch(e){ console.error(e); }
                setSubmitting(false);
              }} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:submitting?0.6:1}}>
                {submitting?"Submitting…":"Submit Application 🌊"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Login ────────────────────────────────────────────────────────────────────
function LoginScreen({members,onLogin,onApply}) {
  const [selected,setSelected]=useState(null);
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const handleNum=n=>{
    if(pin.length>=4)return;
    const next=pin+n;
    setPin(next);
    if(next.length===4){
      setTimeout(()=>{
        if(String(selected.pin)===String(next))onLogin(selected);
        else{setError("Wrong PIN. Try again.");setPin("");}
      },200);
    }
  };
  return (
    <div className="ocean-bg" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,color:G.text,position:"relative"}}>
      <svg style={{position:"fixed",bottom:0,left:0,right:0,zIndex:0,pointerEvents:"none"}} viewBox="0 0 1440 200" preserveAspectRatio="none" height="180" width="100%">
        <path className="wave1" fill="rgba(45,106,45,0.12)" d="M0,100 C180,60 360,140 540,100 C720,60 900,140 1080,100 C1260,60 1380,120 1440,100 L1440,200 L0,200 Z"/>
        <path className="wave2" fill="rgba(234,115,31,0.06)" d="M0,130 C200,90 400,160 600,130 C800,100 1000,160 1200,130 C1320,110 1400,140 1440,130 L1440,200 L0,200 Z"/>
      </svg>
      <div style={{textAlign:"center",marginBottom:28,position:"relative",zIndex:1}} className="fade-up">
        <img src={LOGO_URL} alt="VOA" style={{height:80,marginBottom:16,filter:"brightness(0.1) saturate(1) invert(1) sepia(1) saturate(3) hue-rotate(80deg)",opacity:0.95}}/>
        <div style={{fontSize:10,letterSpacing:"3px",color:G.accent,textTransform:"uppercase",marginBottom:4}}>Ripple Effect Program</div>
        <div style={{fontSize:13,color:G.muted}}>Your accountability. Your impact. 🌊</div>
      </div>
      <div style={{background:"rgba(6,21,36,0.85)",backdropFilter:"blur(20px)",border:`1px solid ${G.border}`,borderRadius:24,padding:"36px 30px",width:"100%",maxWidth:400,position:"relative",zIndex:1}}>
        {!selected?(
          <>
            <div style={{fontSize:12,color:G.muted,marginBottom:14}}>Select your name to sign in:</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {members.map(m=>(
                <button key={m.id} onClick={()=>setSelected(m)} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",background:"rgba(56,189,248,0.04)",border:`1px solid ${G.border}`,borderRadius:14,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",color:G.text,width:"100%",textAlign:"left"}}>
                  {m.photo_url
                    ? <img src={m.photo_url} alt={m.avatar} style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",border:`2px solid ${m.color}`,flexShrink:0}}/>
                    : <div style={{...css.avatar(m.color,40)}}>{m.avatar}</div>
                  }
                  <div>
                    <div style={{fontWeight:700,fontSize:14}}>{m.name}</div>
                    <div style={{fontSize:11,color:G.muted}}>{m.role==="admin"?"🛡 Admin":`🔥 ${m.streak}d streak`}</div>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={onApply} style={{width:"100%",marginTop:16,padding:"12px",borderRadius:12,border:`1px solid rgba(74,222,128,0.25)`,background:"rgba(74,222,128,0.06)",color:G.accent,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              📝 Apply to Join REP →
            </button>
          </>
        ):(
          <>
            <button onClick={()=>{setSelected(null);setPin("");setError("");}} style={{background:"transparent",border:"none",color:G.muted,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13,marginBottom:14,padding:0}}>← Back</button>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
              <div style={css.avatar(selected.color,42)}>{selected.avatar}</div>
              <div><div style={{fontSize:17,fontWeight:800}}>{selected.name}</div><div style={{fontSize:12,color:G.muted}}>Enter your 4-digit PIN</div></div>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
              {[0,1,2,3].map(i=><div key={i} style={css.pinDot(i<pin.length)}/>)}
            </div>
            {error&&<div style={{color:"#fb923c",fontSize:12,textAlign:"center",marginBottom:12}}>{error}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
                <button key={i} disabled={n===""} onClick={()=>n==="⌫"?setPin(p=>p.slice(0,-1)):handleNum(String(n))}
                  style={{...css.numBtn,opacity:n===""?0:1}}>{n}</button>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Root App (Supabase-powered) ──────────────────────────────────────────────
function App() {
  const [member,setMember]=useState(null);
  const [tab,setTab]=useState("home");
  const [view,setView]=useState("login");
  const [goals,setGoals]=useState([]);
  const [members,setMembers]=useState([]);
  const [apps,setApps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(null);

  // ── Load all data from Supabase on mount ──
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      setLoadError(null);
      try {
        const [mData,gData,aData]=await Promise.all([
          db.select("members",{order:"id"}),
          db.select("goals",{order:"id"}),
          db.select("applications",{order:"applied_at.desc"}),
        ]);
        setMembers((mData||[]).map(m=>({...m,bookPct:m.book_pct||0,pin:m.pin||""})));
        setGoals((gData||[]).map(g=>({...g,memberId:g.member_id,proofs:g.proofs||[]})));
        setApps((aData||[]).map(a=>({...a,appliedAt:a.applied_at?.split("T")[0]||""})));
      } catch(e){ console.error("Load error",e); setLoadError("Could not connect. Check your internet and refresh."); }
      setLoading(false);
    }
    loadAll();
  },[]);

  // ── Update goal in Supabase ──
  const updateGoal=async(u)=>{
    setGoals(gs=>gs.map(g=>g.id===u.id?u:g));
    await db.update("goals",{title:u.title,category:u.category,status:u.status,note:u.note,due:u.due},{id:u.id});
  };

  // ── Add goal to Supabase ──
  const addGoal=async(g)=>{
    const data=await db.insert("goals",{member_id:g.memberId,title:g.title,category:g.category,status:g.status,due:g.due,note:g.note||""});
    if(data) setGoals(gs=>[...gs,{...data,memberId:data.member_id,proofs:[]}]);
  };

  // ── Submit application to Supabase ──
  const submitApp=async(a)=>{
    try {
      const payload={
        name:a.name,
        email:a.email,
        whatsapp:a.whatsapp,
        city:a.city,
        age:parseInt(a.age)||0,
        occupation:a.occupation||"",
        why:a.why,
        goals:a.goals,
        referral:a.referral||"",
        commitment:a.commitment,
        status:"pending"
      };
      const data=await db.insert("applications",payload);
      if(data) setApps(as=>[{...data,appliedAt:data.applied_at?.split("T")[0]||""},...as]);
    } catch(e){
      alert("Error: "+e.message);
      throw e;
    }
  };

  // ── Approve / decline application ──
  const decideApp=async(id,status,pin)=>{
    setApps(as=>as.map(a=>a.id===id?{...a,status,assigned_pin:pin}:a));
    await db.update("applications",{status,assigned_pin:pin},{id:id});

    // ── If approved, automatically create a member account + send email ──
    if(status==="approved" && pin){
      const app=apps.find(a=>a.id===id);
      if(app){
        const colors=["#38bdf8","#4ade80","#f472b6","#fb923c","#a78bfa","#34d399","#fbbf24"];
        const color=colors[Math.floor(Math.random()*colors.length)];
        const initials=app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
        const newMember=await db.insert("members",{
          name:app.name,
          pin:pin,
          avatar:initials,
          color:color,
          role:"member",
          streak:0,
          points:0,
          book_pct:0,
          whatsapp:app.whatsapp||"",
          email:app.email||""
        });
        if(newMember) setMembers(ms=>[...ms,{...newMember,bookPct:0}]);

        // ── Open pre-filled email for admin to send to member ──
        if(app.email){
          const subject = encodeURIComponent("Welcome to VOA Ripple Effect Program!");
          const firstName = app.name.split(" ")[0];
          const body = encodeURIComponent(
            "Hi " + firstName + ",\n\n" +
            "Congratulations! Your application to the VOA Ripple Effect Program has been approved. 🎉\n\n" +
            "Here are your login details:\n" +
            "🌐 Portal: https://voarep.vercel.app\n" +
            "👤 Name: " + app.name + "\n" +
            "🔑 Your PIN: " + pin + "\n\n" +
            "To log in:\n" +
            "1. Go to the portal link above\n" +
            "2. Find your name on the login screen\n" +
            "3. Enter your 4-digit PIN\n\n" +
            "Keep this email safe — your PIN is private.\n\n" +
            "Application summary:\n" +
            "Your goals: " + app.goals + "\n\n" +
            "We are so excited to have you in the program. Let the ripple begin! 🌊\n\n" +
            "Warm regards,\n" +
            "VOA REP Team\n" +
            "Volunteers Organization Africa"
          );
          window.open("mailto:" + app.email + "?subject=" + subject + "&body=" + body);
        }
      }
    }
  };

  // ── Update book progress ──
  const updateBookProgress=async(memberId,pct)=>{
    setMembers(ms=>ms.map(m=>m.id===memberId?{...m,bookPct:pct,book_pct:pct}:m));
    await db.update("members",{book_pct:pct},{id:memberId});
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Plus Jakarta Sans',sans-serif",color:G.muted}}>
      <img src={LOGO_URL} alt="VOA" style={{height:60,filter:"brightness(0.1) saturate(1) invert(1) sepia(1) saturate(3) hue-rotate(80deg)",opacity:0.8,marginBottom:4}}/>
      <div style={{fontSize:14}}>{loadError||"Loading VOA REP Portal…"}</div>
      {loadError&&<button onClick={()=>window.location.reload()} style={{padding:"10px 24px",borderRadius:12,border:"none",background:G.accent,color:G.bg,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Retry</button>}
    </div>
  );

  if(view==="apply") return <OnboardingFlow onSubmit={submitApp} onBack={()=>setView("login")}/>;
  if(!member) return <LoginScreen members={members} onLogin={m=>{setMember(m);setView("portal");setTab("home");}} onApply={()=>setView("apply")}/>;

  const isAdmin=member.role==="admin";
  const memberTabs=[{id:"home",label:"🏠 Home"},{id:"books",label:"📖 Book Club"}];

  return (
    <div style={css.root}>
      <div style={css.header}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO_URL} alt="VOA" style={{height:30,filter:"brightness(0.1) saturate(1) invert(1) sepia(1) saturate(3) hue-rotate(80deg)",opacity:0.95}}/>
          <div style={{width:1,height:22,background:G.border}}/>
          <div style={{fontSize:12,fontWeight:700,color:G.accent,letterSpacing:"1px"}}>REP Portal</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {!isAdmin&&memberTabs.map(n=>(
            <button key={n.id} style={css.navItem(tab===n.id)} onClick={()=>setTab(n.id)}>{n.label}</button>
          ))}
          <div style={{...css.avatar(member.color,30),cursor:"pointer",marginLeft:8}} onClick={()=>{setMember(null);setView("login");}} title="Sign out">{member.avatar}</div>
        </div>
      </div>
      {isAdmin
        ? <AdminView members={members} goals={goals} apps={apps} onUpdateGoal={updateGoal} onDecideApp={decideApp} setMembers={setMembers}/>
        : tab==="home"
          ? <MemberHome member={member} goals={goals} onUpdateGoal={updateGoal} onAddGoal={addGoal} onPhotoUpdate={(id,url)=>{setMembers(ms=>ms.map(m=>m.id===id?{...m,photo_url:url}:m));setMember(mb=>({...mb,photo_url:url}));}}/>
          : <BookClubTab member={member} members={members} setMembers={setMembers} onUpdateProgress={updateBookProgress}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
