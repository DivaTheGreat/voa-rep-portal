// Supabase HTTP helper — no SDK needed, works directly with the REST API
const db = {
  async select(table, options={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    if(options.order) url += `order=${options.order}&`;
    url += 'select=*';
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    const result = await res.json();
    return result[0];
  },
  async update(table, data, match) {
    const [col, val] = Object.entries(match)[0];
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${val}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  }
};

// ─── Storage ──────────────────────────────────────────────────────────────────
function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = sessionStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = v => { const next = typeof v==="function"?v(val):v; setVal(next); try { sessionStorage.setItem(key,JSON.stringify(next)); } catch {} };
  return [val, set];
}

// ─── Micro Components ─────────────────────────────────────────────────────────
function Toast({msg,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2600); return ()=>clearTimeout(t); },[]);
  return <div style={css.toast}>{msg}</div>;
}

function ProgressBar({pct,color=G.accent,height=5}) {
  return (
    <div style={{height,borderRadius:4,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
      <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:4}}/>
    </div>
  );
}

function ProofUpload({proofs,onChange,required}) {
  const ref = useRef();
  const handle = files => Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>onChange([...proofs,{url:e.target.result,name:f.name,type:f.type}]);
    r.readAsDataURL(f);
  });
  return (
    <div>
      <div style={{fontSize:12,color:G.muted,marginBottom:8}}>{required?"📸 Photo proof required for Volunteer goals":"📸 Attach proof (optional)"}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {proofs.map((p,i)=>(
          <div key={i} style={{position:"relative"}}>
            {p.type&&p.type.startsWith("image")?
              <img src={p.url} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:10,border:`2px solid ${G.border}`}}/>:
              <div style={{width:76,height:76,background:G.faint,borderRadius:10,border:`2px solid ${G.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:G.muted,textAlign:"center",padding:4}}>📄 {p.name}</div>}
            <button onClick={()=>onChange(proofs.filter((_,j)=>j!==i))}
              style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>×</button>
          </div>
        ))}
        <div onClick={()=>ref.current.click()} style={{border:"2px dashed rgba(74,222,128,0.25)",borderRadius:14,padding:"22px 16px",textAlign:"center",cursor:"pointer",background:"rgba(74,222,128,0.03)",minWidth:76}}>
          <div style={{fontSize:20}}>＋</div>
          <div style={{fontSize:11,color:G.muted,marginTop:3}}>Add</div>
        </div>
      </div>
      <input ref={ref} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>
    </div>
  );
}

// ─── Book Club ────────────────────────────────────────────────────────────────
function BookClubTab({member,members,setMembers,onUpdateProgress,currentBook}) {
  const [book, setBook] = useState(currentBook || BOOK_CLUB.current);
  React.useEffect(()=>{
    (async()=>{
      const rows = await db.select("books",{order:"created_at.desc"});
      if(rows && rows.length>0){
        const cur = rows.find(b=>b.is_current) || rows[0];
        setBook({
          title: cur.title, author: cur.author, emoji: cur.emoji||"📗",
          totalChapters: cur.total_chapters||20,
          month: cur.month, year: cur.year,
          discussion: cur.discussion_date||"",
          week1_prompt: cur.week1_prompt||"",
          week2_prompt: cur.week2_prompt||"",
          week3_prompt: cur.week3_prompt||"",
          week4_prompt: cur.week4_prompt||"",
          id: cur.id,
        });
      }
    })();
  },[]);
  const totalChapters = book?.totalChapters || 20;
  const savedChapter = Math.round(((member.bookPct||0) / 100) * totalChapters);
  const [myChapter,setMyChapter]=useState(savedChapter||0);

  // Keep slider in sync when member.bookPct updates after save
  React.useEffect(()=>{
    const ch = Math.round(((member.bookPct||0) / 100) * totalChapters);
    setMyChapter(ch);
  },[member.bookPct, totalChapters]);
  const [comment,setComment]=useState("");
  const [discussions,setDiscussions]=useState([]);
  const [toast,setToast]=useState(null);
  const [loadingDisc,setLoadingDisc]=useState(true);

  const myPct = totalChapters > 0 ? Math.round((myChapter / totalChapters) * 100) : 0;
  const avgPct = Math.round(members.filter(m=>m.role==="member").reduce((s,m)=>s+(m.bookPct||0),0)/Math.max(members.filter(m=>m.role==="member").length,1));

  React.useEffect(()=>{
    (async()=>{
      setLoadingDisc(true);
      const rows=await db.select("discussions",{order:"created_at.desc"});
      if(rows) setDiscussions(rows);
      setLoadingDisc(false);
    })();
  },[]);

  const saveProgress=async()=>{
    if(onUpdateProgress) await onUpdateProgress(member.id, myPct);
    else setMembers(ms=>ms.map(m=>m.id===member.id?{...m,bookPct:myPct,book_pct:myPct}:m));
    setToast("📖 Chapter "+myChapter+" saved! ("+myPct+"%)");
  };

  const postComment=async()=>{
    if(!comment.trim()) return;
    const row={member_id:member.id,member_name:member.name,member_avatar:member.avatar,
      member_color:member.color,book_title:book.title,message:comment.trim(),
      created_at:new Date().toISOString()};
    const saved=await db.insert("discussions",row);
    if(saved) setDiscussions(ds=>[saved,...ds]);
    setComment("");
    setToast("💬 Posted!");
  };

  return (
    <div style={css.body}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* Book card */}
      <div style={{...css.card,background:"linear-gradient(135deg,#0d3d2a,#1a5c3a)",marginBottom:18,display:"flex",gap:20,alignItems:"center"}}>
        <div style={{width:68,height:92,background:"linear-gradient(135deg,#f26522,#e04e0a)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0}}>{book.emoji||"📗"}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,color:"#8dc63f",letterSpacing:"2px",textTransform:"uppercase",marginBottom:3}}>Current Read</div>
          <div style={{fontSize:20,fontWeight:800,color:"#f5f0e8"}}>{book.title}</div>
          <div style={{color:"#8dc63f",fontSize:13,marginBottom:6}}>by {book.author}</div>
          <div style={{fontSize:12,color:"rgba(245,240,232,0.6)"}}>{totalChapters} chapters · Discussion: {book.discussion}</div>
        </div>
        <div style={{textAlign:"center",flexShrink:0}}>
          <div style={{fontSize:28,fontWeight:800,color:"#f26522"}}>{avgPct}%</div>
          <div style={{fontSize:11,color:"rgba(245,240,232,0.6)"}}>group avg</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
        {/* My Progress */}
        <div style={css.card}>
          <div style={css.cardTitle}>My Progress</div>
          <div style={{fontSize:36,fontWeight:800,color:G.accent,marginBottom:2}}>{myPct}%</div>
          <div style={{fontSize:13,color:G.muted,marginBottom:8}}>
            Chapter <span style={{fontWeight:700,color:G.text}}>{myChapter}</span> of {totalChapters}
          </div>
          <ProgressBar pct={myPct} height={8}/>
          <div style={{marginTop:16}}>
            <div style={{fontSize:11,color:G.muted,marginBottom:8,fontWeight:600}}>SELECT YOUR CHAPTER</div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <button onClick={()=>setMyChapter(c=>Math.max(0,c-1))}
                style={{width:30,height:30,borderRadius:"50%",border:`1px solid ${G.border}`,background:G.faint,color:G.text,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
              <input type="range" min={0} max={totalChapters} value={myChapter}
                onChange={e=>setMyChapter(Number(e.target.value))}
                style={{flex:1,accentColor:G.accent,cursor:"pointer"}}/>
              <button onClick={()=>setMyChapter(c=>Math.min(totalChapters,c+1))}
                style={{width:30,height:30,borderRadius:"50%",border:`1px solid ${G.border}`,background:G.faint,color:G.text,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:12}}>
              {Array.from({length:totalChapters}).map((_,i)=>(
                <div key={i} onClick={()=>setMyChapter(i+1)}
                  title={"Ch."+(i+1)}
                  style={{width:22,height:22,borderRadius:4,cursor:"pointer",fontSize:9,fontWeight:700,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    background:i<myChapter?G.accent:G.faint,
                    color:i<myChapter?"#fff":G.muted,
                    border:`1px solid ${i<myChapter?G.accent:G.border}`}}>
                  {i+1}
                </div>
              ))}
            </div>
            <button style={{...css.btn("primary"),width:"100%"}} onClick={saveProgress}>Save Progress</button>
          </div>
        </div>

        {/* Group Progress */}
        <div style={css.card}>
          <div style={css.cardTitle}>Group Progress</div>
          {members.filter(m=>m.role==="member").map((m)=>{
            const chapDone=Math.round(((m.bookPct||0)/100)*totalChapters);
            return (
              <div key={m.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {m.photo_url
                      ? <img src={m.photo_url} alt={m.avatar} style={{width:26,height:26,borderRadius:"50%",objectFit:"cover",border:`2px solid ${m.color}`}}/>
                      : <div style={css.avatar(m.color,26)}>{m.avatar}</div>}
                    <span style={{fontSize:13,fontWeight:600}}>{m.name.split(" ")[0]}</span>
                  </div>
                  <span style={{fontSize:11,color:G.muted}}>Ch.{chapDone}/{totalChapters} · {m.bookPct||0}%</span>
                </div>
                <ProgressBar pct={m.bookPct||0} height={6} color={m.color}/>
              </div>
            );
          })}
        </div>
      </div>

      {/* Weekly auto-prompt */}
      {(()=>{
        const weekNum = Math.min(Math.ceil(new Date().getDate()/7), 4);
        const promptKey = "week"+weekNum+"_prompt";
        const prompt = book[promptKey] || book.week1_prompt || "";
        return prompt ? (
          <div style={{...css.card,marginBottom:18,background:"linear-gradient(135deg,#0d0d0d,#1a0a00)",border:`1px solid ${G.borderBright}`}}>
            <div style={{fontSize:10,color:G.accent,letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>💬 Week {weekNum} Prompt — {book.month||""} {book.year||""}</div>
            <div style={{fontSize:14,color:"#f5f0e8",lineHeight:1.6,fontStyle:"italic"}}>"{prompt}"</div>
          </div>
        ) : null;
      })()}

      {/* Post comment */}
      <div style={{...css.card,marginBottom:18}}>
        <div style={css.cardTitle}>Share Your Thoughts</div>
        <textarea style={{...css.textarea,marginBottom:10}} rows={3}
          placeholder="What are your thoughts on this month's book?"
          value={comment} onChange={e=>setComment(e.target.value)}/>
        <button style={{...css.btn("primary"),width:"100%"}} onClick={postComment}>Post</button>
      </div>

      {/* Discussions */}
      <div style={css.card}>
        <div style={css.cardTitle}>Discussion Board</div>
        {loadingDisc ? <div style={{color:G.muted,fontSize:13}}>Loading...</div>
        : discussions.length===0 ? <div style={{color:G.muted,fontSize:13}}>No posts yet — be the first!</div>
        : discussions.map((d,i)=>(
          <div key={i} style={{borderBottom:`1px solid ${G.border}`,paddingBottom:12,marginBottom:12}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
              <div style={css.avatar(d.member_color||"#888",30)}>{d.member_avatar}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{d.member_name}</div>
                <div style={{fontSize:11,color:G.muted}}>{new Date(d.created_at).toLocaleDateString()}</div>
              </div>
            </div>
            <div style={{fontSize:14,lineHeight:1.6}}>{d.message}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


function LeaderboardTab({member, members, goals, isAdmin}) {
  const allMembers = members.filter(m=>m.role==="member");
  const [tab,setTab]=useState("monthly");
  const [history,setHistory]=useState([]);

  React.useEffect(()=>{
    (async()=>{
      const rows=await db.select("monthly_scores",{order:"created_at.desc"});
      if(rows) setHistory(rows);
    })();
  },[]);

  const ranked=(scoreKey)=>[...allMembers].sort((a,b)=>(b[scoreKey]||0)-(a[scoreKey]||0)).map((m,i)=>{
    const mGoals=goals.filter(g=>g.member_id===m.id);
    return {...m,done:mGoals.filter(g=>g.status==="completed").length,total:mGoals.length,volDone:mGoals.filter(g=>g.status==="completed"&&g.category==="Volunteer").length};
  });

  const medals=["🥇","🥈","🥉"];

  const MemberRow=({m,i,scoreKey})=>{
    const isMe=!isAdmin&&member&&m.id===member.id;
    const score=m[scoreKey]||0;
    const topScore=ranked(scoreKey)[0]?.[scoreKey]||1;
    const barW=Math.round((score/topScore)*100);
    return (
      <div style={{padding:"14px 16px",marginBottom:8,borderRadius:12,
        background:isMe?"linear-gradient(135deg,#1a0a00,#2a1000)":G.surface2,
        border:isMe?`2px solid ${G.accent}`:`1px solid ${G.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          <div style={{fontSize:i<3?22:14,fontWeight:800,width:32,textAlign:"center",flexShrink:0,
            color:i===0?"#fbbf24":i===1?"#9ca3af":i===2?"#cd7c2f":G.muted}}>
            {i<3?medals[i]:`#${i+1}`}
          </div>
          {m.photo_url
            ?<img src={m.photo_url} alt={m.avatar} style={{width:40,height:40,borderRadius:"50%",objectFit:"cover",border:`2px solid ${m.color}`,flexShrink:0}}/>
            :<div style={css.avatar(m.color,40)}>{m.avatar}</div>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{fontWeight:700,fontSize:15,color:isMe?G.accent:G.text}}>{m.name}</span>
              {isMe&&<span style={{fontSize:10,background:G.accent,color:"#fff",padding:"2px 6px",borderRadius:20,fontWeight:700}}>YOU</span>}
            </div>
            <div style={{fontSize:12,color:G.muted}}>🎯 {m.done}/{m.total} · 🌊 {m.volDone} vol · 🔥 {m.streak||0}d</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:20,fontWeight:800,color:i===0?"#fbbf24":G.accent}}>{score}</div>
            <div style={{fontSize:10,color:G.muted}}>pts</div>
          </div>
        </div>
        <div style={{height:4,background:G.faint,borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:barW+"%",background:i===0?"linear-gradient(90deg,#f26522,#fbbf24)":`linear-gradient(90deg,${m.color},${m.color}99)`,borderRadius:4}}/>
        </div>
      </div>
    );
  };

  // group history by month/year
  const months=[...new Set(history.map(h=>h.month+" "+h.year))];

  return (
    <div style={css.body}>
      <div style={{...css.card,background:"linear-gradient(135deg,#0a0a0a,#1a0a00)",marginBottom:18,textAlign:"center",padding:"20px"}}>
        <div style={{fontSize:32,marginBottom:4}}>🏆</div>
        <div style={{fontSize:20,fontWeight:800,color:"#f5f0e8"}}>REP Leaderboard</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:18,overflowX:"auto"}}>
        {["monthly","lifetime","history","book"].map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{...css.btn(tab===t?"primary":"ghost"),flexShrink:0,fontSize:12,padding:"8px 14px",textTransform:"capitalize"}}>
            {t==="monthly"?"📅 This Month":t==="lifetime"?"⭐ All Time":t==="history"?"🗂 History":"📖 Book"}
          </button>
        ))}
      </div>

      {/* Points legend */}
      {(tab==="monthly"||tab==="lifetime")&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:18}}>
          {[{l:"Volunteer",p:"20pts",c:"#f26522"},{l:"Personal",p:"10pts",c:"#8dc63f"},{l:"Reading",p:"10pts",c:"#60a5fa"},{l:"100pts earned",p:"+50 bonus",c:"#fbbf24"}]
            .map((r,i)=>(
            <div key={i} style={{background:G.surface,borderRadius:10,padding:"8px",textAlign:"center",border:`1px solid ${G.border}`}}>
              <div style={{fontSize:12,fontWeight:800,color:r.c}}>{r.p}</div>
              <div style={{fontSize:9,color:G.muted,marginTop:1}}>{r.l}</div>
            </div>
          ))}
        </div>
      )}

      {tab==="monthly"&&ranked("monthly_points").map((m,i)=><MemberRow key={m.id} m={m} i={i} scoreKey="monthly_points"/>)}
      {tab==="lifetime"&&ranked("lifetime_points").map((m,i)=><MemberRow key={m.id} m={m} i={i} scoreKey="lifetime_points"/>)}

      {tab==="history"&&(
        <div>
          {months.length===0
            ?<div style={{...css.card,color:G.muted,textAlign:"center",padding:30}}>No archived months yet</div>
            :months.map(mo=>{
              const moScores=history.filter(h=>h.month+" "+h.year===mo).sort((a,b)=>b.points-a.points);
              return (
                <div key={mo} style={{...css.card,marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:800,color:G.accent,marginBottom:12}}>📅 {mo}</div>
                  {moScores.map((s,i)=>(
                    <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"8px 12px",background:G.faint,borderRadius:10}}>
                      <div style={{fontSize:i<3?18:13,width:28,textAlign:"center"}}>{i<3?medals[i]:`#${i+1}`}</div>
                      <div style={{flex:1,fontWeight:600,fontSize:13}}>{s.member_name}</div>
                      <div style={{fontWeight:800,color:G.accent}}>{s.points} pts</div>
                      <div style={{fontSize:11,color:G.muted}}>🎯{s.goals_completed} 🌊{s.volunteer_goals}</div>
                    </div>
                  ))}
                </div>
              );
            })
          }
        </div>
      )}

      {tab==="book"&&(
        <div style={css.card}>
          <div style={css.cardTitle}>📖 Book Progress</div>
          {[...allMembers].sort((a,b)=>(b.bookPct||0)-(a.bookPct||0)).map((m,i)=>(
            <div key={m.id} style={{marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:22,textAlign:"center",fontSize:12,fontWeight:700,color:G.muted}}>#{i+1}</div>
              {m.photo_url?<img src={m.photo_url} alt={m.avatar} style={{width:30,height:30,borderRadius:"50%",objectFit:"cover",border:`2px solid ${m.color}`,flexShrink:0}}/>
                :<div style={css.avatar(m.color,30)}>{m.avatar}</div>}
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:600}}>{m.name.split(" ")[0]}</span>
                  <span style={{fontSize:12,color:G.muted}}>{m.bookPct||0}%</span>
                </div>
                <ProgressBar pct={m.bookPct||0} height={6} color={m.color}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function AdminBookTab({currentBook,onUpdateBook}) {
  const [books, setBooks] = useState([]);
  const [title,setTitle]=useState("");
  const [author,setAuthor]=useState("");
  const [emoji,setEmoji]=useState("📗");
  const [totalChapters,setTotalChapters]=useState(20);
  const [month,setMonth]=useState("March");
  const [year,setYear]=useState(2026);
  const [discussionDate,setDiscussionDate]=useState("");
  const [w1,setW1]=useState("");
  const [w2,setW2]=useState("");
  const [w3,setW3]=useState("");
  const [w4,setW4]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("current");

  React.useEffect(()=>{
    (async()=>{
      const rows=await db.select("books",{order:"created_at.desc"});
      if(rows) setBooks(rows);
      const cur=rows&&rows.find(b=>b.is_current);
      if(cur) loadBook(cur);
    })();
  },[]);

  const loadBook=(b)=>{
    setEditingId(b.id);
    setTitle(b.title||"");
    setAuthor(b.author||"");
    setEmoji(b.emoji||"📗");
    setTotalChapters(b.total_chapters||20);
    setMonth(b.month||"March");
    setYear(b.year||2026);
    setDiscussionDate(b.discussion_date||"");
    setW1(b.week1_prompt||"");
    setW2(b.week2_prompt||"");
    setW3(b.week3_prompt||"");
    setW4(b.week4_prompt||"");
  };

  const saveBook=async()=>{
    if(!title.trim()||!author.trim()) return;
    const data={title:title.trim(),author:author.trim(),emoji,total_chapters:Number(totalChapters),
      month,year:Number(year),discussion_date:discussionDate,
      week1_prompt:w1,week2_prompt:w2,week3_prompt:w3,week4_prompt:w4};
    if(editingId){
      await db.update("books",data,{id:editingId});
      setBooks(bs=>bs.map(b=>b.id===editingId?{...b,...data}:b));
      setToast("✅ Book updated!");
    } else {
      // new book — set all others to not current
      await fetch(`${SUPABASE_URL}/rest/v1/books`,{method:"PATCH",
        headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
        body:JSON.stringify({is_current:false})});
      const saved=await db.insert("books",{...data,is_current:true});
      if(saved){setBooks(bs=>[saved,...bs]);setEditingId(saved.id);}
      setToast("✅ New book created!");
    }
    onUpdateBook&&onUpdateBook({title,author,emoji,totalChapters:Number(totalChapters),month,year,discussion:discussionDate,week1_prompt:w1,week2_prompt:w2,week3_prompt:w3,week4_prompt:w4});
  };

  const setAsCurrent=async(b)=>{
    await fetch(`${SUPABASE_URL}/rest/v1/books`,{method:"PATCH",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({is_current:false})});
    await db.update("books",{is_current:true},{id:b.id});
    setBooks(bs=>bs.map(bk=>({...bk,is_current:bk.id===b.id})));
    loadBook(b);
    setToast("📚 "+b.title+" set as current book!");
  };

  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

  return (
    <div style={css.body}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {["current","archive"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{...css.btn(tab===t?"primary":"ghost"),flex:1,textTransform:"capitalize"}}>
            {t==="current"?"📚 Current Book":"🗂 Archive"}
          </button>
        ))}
      </div>

      {tab==="current"&&(
        <div style={css.card}>
          <div style={css.cardTitle}>{editingId?"Edit Book":"New Book of the Month"}</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div>
              <div style={{fontSize:11,color:G.muted,fontWeight:600,marginBottom:6}}>MONTH</div>
              <select style={css.select} value={month} onChange={e=>setMonth(e.target.value)}>
                {months.map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,color:G.muted,fontWeight:600,marginBottom:6}}>YEAR</div>
              <input style={css.input} type="number" value={year} onChange={e=>setYear(e.target.value)}/>
            </div>
          </div>

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:G.muted,fontWeight:600,marginBottom:6}}>BOOK TITLE</div>
            <input style={css.input} value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Atomic Habits"/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:G.muted,fontWeight:600,marginBottom:6}}>AUTHOR</div>
            <input style={css.input} value={author} onChange={e=>setAuthor(e.target.value)} placeholder="e.g. James Clear"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div>
              <div style={{fontSize:11,color:G.muted,fontWeight:600,marginBottom:6}}>EMOJI</div>
              <input style={css.input} value={emoji} onChange={e=>setEmoji(e.target.value)} maxLength={2}/>
            </div>

// ─── Photo Upload Component ───────────────────────────────────────────────────
function PhotoUpload({member,onUpdate}) {
  const ref = useRef();
  const [uploading,setUploading] = useState(false);
  const handle = async(file) => {
    if(!file) return;
    setUploading(true);
    const r = new FileReader();
    r.onload = async(e) => {
      const dataUrl = e.target.result;
      try {
        await db.update("members",{photo_url:dataUrl},{id:member.id});
        if(onUpdate) onUpdate(member.id, dataUrl);
      } catch(err) { alert("Photo upload failed: "+err.message); }
      setUploading(false);
    };
    r.readAsDataURL(file);
  };
  return (
    <div style={{marginTop:6}}>
      <button onClick={()=>ref.current.click()} style={{fontSize:10,color:G.accent,background:"rgba(56,189,248,0.1)",border:`1px solid rgba(56,189,248,0.2)`,borderRadius:8,padding:"3px 8px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
        {uploading?"Uploading...":"📷 Photo"}
      </button>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

          {displayedApps.map(app=>(

              <div style={{...css.avatar(COLORS_POOL[app.id.length%COLORS_POOL.length],40)}}>{app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>

            </div>
          ))}
        </div>
      )}

      {tab==="leaderboard"&&<LeaderboardTab member={{id:null}} members={members} goals={goals} isAdmin={true}/>}
    </div>
  );
}

// ─── Onboarding Flow ──────────────────────────────────────────────────────────

      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"3px",color:G2.accent,textTransform:"uppercase",marginBottom:6}}>Volunteers Organization Africa</div>
        <div style={{marginBottom:10,textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",letterSpacing:"-4px",lineHeight:0.85}}>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",zIndex:1}}>V</span>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",marginLeft:"-10px",marginRight:"-10px",zIndex:2}}>O</span>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",zIndex:1}}>A</span>

          <div style={{fontSize:8,fontWeight:500,color:"#8dc63f",letterSpacing:"1.5px",marginTop:2,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>RIPPLE EFFECT PROGRAM</div>

            <div style={{fontSize:44,marginBottom:14}}>🌊</div>

          </div>
        )}
        {step===1&&(

              <button onClick={()=>setStep(3)} disabled={form.why.length<40} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:form.why.length>=40?1:0.4}}>Continue →</button>

        {step===3&&(

                  border:`1.5px solid ${form.commitment===o.v?G2.accent:"rgba(96,165,250,0.2)"}`,background:form.commitment===o.v?"rgba(96,165,250,0.1)":"transparent",color:form.commitment===o.v?G2.accent:G2.muted}}>{o.l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(4)} disabled={!form.goals||form.commitment!=="yes"} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:(form.goals&&form.commitment==="yes")?1:0.4}}>Review →</button>
            </div>
          </div>
        )}
        {step===4&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Review & Submit</div>
            {[{l:"Name",v:form.name},{l:"Email",v:form.email},{l:"WhatsApp",v:form.whatsapp},{l:"City",v:form.city},{l:"Age",v:form.age}].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
                <span style={{fontSize:12,color:G2.muted,fontWeight:600}}>{r.l}</span>
                <span style={{fontSize:13,fontWeight:700}}>{r.v}</span>
              </div>
            ))}
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginTop:14,marginBottom:14}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>WHY JOINING</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.6}}>{form.why}</div>
            </div>
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginBottom:18}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>GOALS</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{form.goals}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(3)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={async()=>{
                setSubmitting(true);
                try {
                  await onSubmit({...form});
                  setDone(true);
                } catch(e){ console.error(e); }
                setSubmitting(false);
              }} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,opacity:submitting?0.6:1}}>
                {submitting?"Submitting…":"Submit Application 🌊"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        ):(
          <>
            <button onClick={()=>{setSelected(null);setPin("");setError("");}} style={{background:"transparent",border:"none",color:G.muted,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13,marginBottom:14,padding:0}}>← Back</button>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
              <div style={css.avatar(selected.color,42)}>{selected.avatar}</div>
              <div><div style={{fontSize:17,fontWeight:800}}>{selected.name}</div><div style={{fontSize:12,color:G.muted}}>Enter your 4-digit PIN</div></div>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
              {[0,1,2,3].map(i=><div key={i} style={css.pinDot(i<pin.length)}/>)}
            </div>
            {error&&<div style={{color:"#fb923c",fontSize:12,textAlign:"center",marginBottom:12}}>{error}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
                <button key={i} disabled={n===""} onClick={()=>n==="⌫"?setPin(p=>p.slice(0,-1)):handleNum(String(n))}
                  style={{...css.numBtn,opacity:n===""?0:1}}>{n}</button>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Root App (Supabase-powered) ──────────────────────────────────────────────
// ── Points helper: earned_since_bonus tracking + milestone bonus ──
async function awardPoints(owner, pts, setMembers, setMember, currentMember) {
  const prevEarned = owner.earned_since_bonus || 0;
  const newEarned = prevEarned + pts;
  const prevMonthly = owner.monthly_points || 0;
  const prevLifetime = owner.lifetime_points || 0;
  let bonus = 0;
  let earnedAfterBonus = newEarned;

  // check if crossed 100 milestone
  if(Math.floor(newEarned / 100) > Math.floor(prevEarned / 100)) {
    bonus = 50;
    earnedAfterBonus = newEarned % 100; // reset counter relative to milestone
  }

  const totalAdd = pts + bonus;
  const newPoints = (owner.points || 0) + totalAdd;
  const newMonthly = prevMonthly + totalAdd;
  const newLifetime = prevLifetime + totalAdd;

  const updates = {
    points: newPoints,
    monthly_points: newMonthly,
    lifetime_points: newLifetime,
    earned_since_bonus: newEarned % 100 === 0 && bonus > 0 ? 0 : newEarned % 100,
  };

  setMembers(ms=>ms.map(m=>m.id===owner.id?{...m,...updates,bookPct:m.bookPct}:m));
  if(currentMember && currentMember.id===owner.id) setMember(mb=>({...mb,...updates}));
  await db.update("members", updates, {id: owner.id});

  if(bonus > 0) {
    // show global bonus toast — use window event
    window.dispatchEvent(new CustomEvent('bonusPoints', {detail:{name:owner.name,bonus}}));
  }
}

function App() {
  const [member,setMember]=useState(null);
  const [tab,setTab]=useState("home");
  const [view,setView]=useState("login");
  const [goals,setGoals]=useState([]);
  const [members,setMembers]=useState([]);
  const [apps,setApps]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(null);
  const [globalToast,setGlobalToast]=useState(null);
  React.useEffect(()=>{
    const handler=(e)=>{
      setGlobalToast("🎉 "+e.detail.name.split(" ")[0]+" hit 100 pts! +50 bonus awarded!");
    };
    window.addEventListener('bonusPoints',handler);
    return ()=>window.removeEventListener('bonusPoints',handler);
  },[]);
  const [currentBook,setCurrentBook]=useState(BOOK_CLUB.current);

  // ── Load all data from Supabase on mount ──
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      setLoadError(null);
      try {
        const [mData,gData,aData]=await Promise.all([
          db.select("members",{order:"id"}),
          db.select("goals",{order:"id"}),
          db.select("applications",{order:"applied_at.desc"}),
        ]);
        setMembers((mData||[]).map(m=>({...m,bookPct:m.book_pct||0,pin:m.pin||""})));
        setGoals((gData||[]).map(g=>({...g,memberId:g.member_id,proofs:g.proofs||[]})));
        setApps((aData||[]).map(a=>({...a,appliedAt:a.applied_at?.split("T")[0]||""})));
      } catch(e){ console.error("Load error",e); setLoadError("Could not connect. Check your internet and refresh."); }
      setLoading(false);
    }
    loadAll();
  },[]);

  // ── Update goal in Supabase ──
  const updateGoal=async(u)=>{
    const prev=goals.find(g=>g.id===u.id);
    setGoals(gs=>gs.map(g=>g.id===u.id?u:g));
    await db.update("goals",{title:u.title,category:u.category,status:u.status,note:u.note,due:u.due},{id:u.id});
    // ── Award points when goal is newly completed ──
    if(u.status==="completed" && prev && prev.status!=="completed"){
      const pts = u.category==="Volunteer" ? 20 : u.category==="Personal" ? 10 : 10;
      const owner = members.find(m=>m.id===(u.member_id||u.memberId));
      if(owner) await awardPoints(owner, pts, setMembers, setMember, member);
    }
  };

  // ── Add goal to Supabase ──
  const addGoal=async(g)=>{
    const data=await db.insert("goals",{member_id:g.memberId,title:g.title,category:g.category,status:g.status,due:g.due,note:g.note||""});
    if(data) setGoals(gs=>[...gs,{...data,memberId:data.member_id,proofs:[]}]);
  };

  // ── Submit application to Supabase ──
  const submitApp=async(a)=>{
    try {
      const payload={
        name:a.name,
        email:a.email,
        whatsapp:a.whatsapp,
        city:a.city,
        age:parseInt(a.age)||0,
        occupation:a.occupation||"",
        why:a.why,
        goals:a.goals,
        referral:a.referral||"",
        commitment:a.commitment,
        status:"pending"
      };
      const data=await db.insert("applications",payload);
      if(data) setApps(as=>[{...data,appliedAt:data.applied_at?.split("T")[0]||""},...as]);
    } catch(e){
      alert("Error: "+e.message);
      throw e;
    }
  };

  // ── Approve / decline application ──
  const decideApp=async(id,status,pin)=>{
    setApps(as=>as.map(a=>a.id===id?{...a,status,assigned_pin:pin}:a));
    await db.update("applications",{status,assigned_pin:pin},{id:id});

    // ── If approved, automatically create a member account + send email ──
    if(status==="approved" && pin){
      const app=apps.find(a=>a.id===id);
      if(app){
        const colors=["#38bdf8","#4ade80","#f472b6","#fb923c","#a78bfa","#34d399","#fbbf24"];
        const color=colors[Math.floor(Math.random()*colors.length)];
        const initials=app.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
        const newMember=await db.insert("members",{
          name:app.name,
          pin:pin,
          avatar:initials,
          color:color,
          role:"member",
          streak:0,
          points:0,
          book_pct:0,
          whatsapp:app.whatsapp||"",
          email:app.email||""
        });
        if(newMember) setMembers(ms=>[...ms,{...newMember,bookPct:0}]);

        // ── Send welcome email via EmailJS ──
        if(app.email){
          try {
            emailjs.init(EJS_KEY);
            await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
              to_name:    app.name.split(" ")[0],
              to_email:   app.email,
              full_name:  app.name,
              pin:        pin,
              portal_url: "https://rep.voofafrica.org",
              goals:      app.goals || "—",
              whatsapp:   app.whatsapp || "—",
            });
            setGlobalToast("✅ Email sent to " + app.email + "!");
          } catch(emailErr){
            console.error("Email error:", emailErr);
            alert("Member approved but email failed: " + (emailErr.text || emailErr.message) + "\nPlease send their PIN manually.");
          }
        }
      }
    }
  };

  // ── Update book progress ──
  const updateBookProgress=async(memberId,pct)=>{
    const prev=members.find(m=>m.id===memberId);
    setMembers(ms=>ms.map(m=>m.id===memberId?{...m,bookPct:pct,book_pct:pct}:m));
    await db.update("members",{book_pct:pct},{id:memberId});
    // ── Award 5 pts each time progress increases by at least 5% ──
    if(prev && pct > (prev.bookPct||0) + 4){
      await awardPoints(prev, 5, setMembers, setMember, member);
    }
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Plus Jakarta Sans',sans-serif",color:G.muted}}>
      <div style={{marginBottom:4,textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",lineHeight:0.85}}>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",zIndex:1}}>V</span>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",marginLeft:"-10px",marginRight:"-10px",zIndex:2}}>O</span>
            <span style={{fontSize:52,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",zIndex:1}}>A</span>
          </div>
        </div>
      <div style={{fontSize:14}}>{loadError||"Loading VOA REP Portal…"}</div>
      {loadError&&<button onClick={()=>window.location.reload()} style={{padding:"10px 24px",borderRadius:12,border:"none",background:G.accent,color:G.bg,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Retry</button>}
    </div>
  );

  if(view==="apply") return <OnboardingFlow onSubmit={submitApp} onBack={()=>setView("login")}/>;
  // Global toast for App-level events (e.g. email sent)
  if(!member) return <LoginScreen members={members} onLogin={async(m)=>{
        setMember(m);setView("portal");setTab("home");
        // ── Monthly reset check ──
        if(m.role==="member"){
          const now=new Date();
          const thisMonth=now.toLocaleString("default",{month:"long"})+" "+now.getFullYear();
          if(m.current_month && m.current_month!==thisMonth){
            // archive previous month
            const mGoals=goals.filter(g=>g.member_id===m.id);
            await db.insert("monthly_scores",{
              member_id:m.id,member_name:m.name,
              month:m.current_month.split(" ")[0],
              year:parseInt(m.current_month.split(" ")[1])||now.getFullYear(),
              points:m.monthly_points||0,
              goals_completed:mGoals.filter(g=>g.status==="completed").length,
              volunteer_goals:mGoals.filter(g=>g.status==="completed"&&g.category==="Volunteer").length,
            });
            const reset={monthly_points:0,earned_since_bonus:0,current_month:thisMonth};
            await db.update("members",reset,{id:m.id});
            setMember(mb=>({...mb,...reset}));
            setMembers(ms=>ms.map(mm=>mm.id===m.id?{...mm,...reset}:mm));
            setGlobalToast("🗓 New month! Points reset. Last month archived.");
          } else if(!m.current_month){
            await db.update("members",{current_month:thisMonth},{id:m.id});
            setMember(mb=>({...mb,current_month:thisMonth}));
          }

          // ── Streak update ──
          const today = new Date();
          today.setHours(0,0,0,0);
          const todayStr = today.toISOString().split("T")[0];

          let newStreak = m.streak || 0;

          if(m.last_login) {
            const last = new Date(m.last_login);
            last.setHours(0,0,0,0);
            const diffDays = Math.round((today - last) / (1000*60*60*24));
            if(diffDays === 0) {
              // already logged in today, no change
              newStreak = m.streak || 1;
            } else if(diffDays === 1) {
              // logged in yesterday — increment streak
              newStreak = (m.streak || 0) + 1;
            } else {
              // missed a day — reset to 1
              newStreak = 1;
            }
          } else {
            // first ever login
            newStreak = 1;
          }

          if(newStreak !== m.streak || m.last_login !== todayStr) {
            await db.update("members", {streak: newStreak, last_login: todayStr}, {id: m.id});
            setMember(mb=>({...mb, streak: newStreak, last_login: todayStr}));
            setMembers(ms=>ms.map(mm=>mm.id===m.id?{...mm,streak:newStreak,last_login:todayStr}:mm));
          }
        }
      }} onApply={()=>setView("apply")}/>;

  const isAdmin=member.role==="admin";
  const memberTabs=[{id:"home",label:"🏠 Home"},{id:"books",label:"📖 Book Club"},{id:"leaderboard",label:"🏆 Leaderboard"}];

  return (
    <div style={css.root}>
      {globalToast&&<Toast msg={globalToast} onDone={()=>setGlobalToast(null)}/>}
      <div style={css.header}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",lineHeight:1,gap:0}}>
            <span style={{fontSize:22,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1}}>V</span>
            <span style={{fontSize:22,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1,marginLeft:"-4px",marginRight:"-4px"}}>O</span>
            <span style={{fontSize:22,fontWeight:900,color:"#f26522",fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1}}>A</span>
          </div>
          <div style={{width:1,height:22,background:G.border}}/>
          <div style={{fontSize:12,fontWeight:700,color:G.accent,letterSpacing:"1px"}}>REP Portal</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {!isAdmin&&memberTabs.map(n=>(
            <button key={n.id} style={css.navItem(tab===n.id)} onClick={()=>setTab(n.id)}>{n.label}</button>
          ))}
          <div style={{...css.avatar(member.color,30),cursor:"pointer",marginLeft:8}} onClick={()=>{setMember(null);setView("login");}} title="Sign out">{member.avatar}</div>
        </div>
      </div>
      {isAdmin
        ? <AdminView members={members} goals={goals} apps={apps} onUpdateGoal={updateGoal} onDecideApp={decideApp} setMembers={setMembers} currentBook={currentBook} onUpdateBook={setCurrentBook}/>
        : tab==="home"
          ? <MemberHome member={member} goals={goals} onUpdateGoal={updateGoal} onAddGoal={addGoal} onPhotoUpdate={(id,url)=>{setMembers(ms=>ms.map(m=>m.id===id?{...m,photo_url:url}:m));setMember(mb=>({...mb,photo_url:url}));}}/>
          : tab==="books"
          ? <BookClubTab member={member} members={members} setMembers={setMembers} onUpdateProgress={updateBookProgress} currentBook={currentBook}/>
          : <LeaderboardTab member={member} members={members} goals={goals}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
