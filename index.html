// Supabase HTTP helper — no SDK needed, works directly with the REST API
const db = {
  async select(table, options={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    if(options.order) url += `order=${options.order}&`;
    url += 'select=*';
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    const result = await res.json();
    return result[0];
  },
  async update(table, data, match) {
    const [col, val] = Object.entries(match)[0];
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${val}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error(await res.text());
    return res.json();
  }
};

// ─── Storage ──────────────────────────────────────────────────────────────────
function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = sessionStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = v => { const next = typeof v==="function"?v(val):v; setVal(next); try { sessionStorage.setItem(key,JSON.stringify(next)); } catch {} };
  return [val, set];
}

// ─── Micro Components ─────────────────────────────────────────────────────────
function Toast({msg,onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,2600); return ()=>clearTimeout(t); },[]);
  return <div style={css.toast}>{msg}</div>;
}

function ProgressBar({pct,color=G.accent,height=5}) {
  return (
    <div style={{height,borderRadius:4,background:"rgba(255,255,255,0.07)",overflow:"hidden"}}>
      <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,borderRadius:4}}/>
    </div>
  );
}

function ProofUpload({proofs,onChange,required}) {
  const ref = useRef();
  const handle = files => Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>onChange([...proofs,{url:e.target.result,name:f.name,type:f.type}]);
    r.readAsDataURL(f);
  });
  return (
    <div>
      <div style={{fontSize:12,color:G.muted,marginBottom:8}}>{required?"📸 Photo proof required for Volunteer goals":"📸 Attach proof (optional)"}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {proofs.map((p,i)=>(
          <div key={i} style={{position:"relative"}}>
            {p.type&&p.type.startsWith("image")?
              <img src={p.url} alt="" style={{width:76,height:76,objectFit:"cover",borderRadius:10,border:`2px solid ${G.border}`}}/>:
              <div style={{width:76,height:76,background:G.faint,borderRadius:10,border:`2px solid ${G.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:G.muted,textAlign:"center",padding:4}}>📄 {p.name}</div>}
            <button onClick={()=>onChange(proofs.filter((_,j)=>j!==i))}
              style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",fontSize:12,cursor:"pointer"}}>×</button>
          </div>
        ))}
        <div onClick={()=>ref.current.click()} style={{border:"2px dashed rgba(74,222,128,0.25)",borderRadius:14,padding:"22px 16px",textAlign:"center",cursor:"pointer",background:"rgba(74,222,128,0.03)",minWidth:76}}>
          <div style={{fontSize:20}}>＋</div>
          <div style={{fontSize:11,color:G.muted,marginTop:3}}>Add</div>
        </div>
      </div>
      <input ref={ref} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>
    </div>
  );
}

// ─── Nudges (Admin) ───────────────────────────────────────────────────────────
function NudgesTab({members,goals}) {
  const [copied,setCopied]=useState(null);
  const done=goals.filter(g=>g.status==="completed").length;
  const avgBook=Math.round(members.filter(m=>m.role==="member").reduce((s,m)=>s+m.bookPct,0)/members.filter(m=>m.role==="member").length);
  const top=members.filter(m=>m.role==="member").sort((a,b)=>b.streak-a.streak)[0];
  const [custom,setCustom]=useState("");
  const copy=(text,id)=>{navigator.clipboard.writeText(text).then(()=>{setCopied(id);setTimeout(()=>setCopied(null),2000);});};
  const nudges=[
    {id:"weekly",label:"🔥 Weekly Nudge",freq:"Every Monday",
     msg:`Hey REP fam! 👋\n\nNew week check-in time!\n\n📖 Drop a 🔥 if you've read your Atomic Habits chapters\n🎯 Share ONE goal you're committing to this week\n💪 Log your volunteer hours!\n\nLet's keep the ripple going 🌊\n— VOA REP Team`},
    {id:"monthly",label:"📊 Monthly Recap",freq:"1st of each month",
     msg:`🌟 REP Monthly Recap!\n\nThis month together:\n✅ ${done} goals completed\n📗 Avg book progress: ${avgBook}%\n🔥 Top streak: ${top&&top.name} at ${top&&top.streak} days!\n\nEvery small action creates a ripple. Keep going 💚\n— VOA REP Team`},
    {id:"book",label:"📖 Book Club Reminder",freq:"2 days before discussion",
     msg:`📚 Book Club in 2 days!\n\nWe're discussing "Atomic Habits"\n\n💬 Prompt: "What ONE habit have you started or dropped based on the book?"\n\nCome ready to share! 📗\n— VOA REP Team`},
  ];
  return (
    <div style={css.body}>
      {nudges.map(n=>(
        <div key={n.id} style={{...css.card,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{n.label}</div><div style={{fontSize:11,color:G.accent}}>📅 {n.freq}</div></div>
            <button onClick={()=>copy(n.msg,n.id)} style={{...css.btn("secondary"),fontSize:12,padding:"7px 14px"}}>{copied===n.id?"✓ Copied!":"Copy →"}</button>
          </div>
          <div style={{background:G.faint,borderRadius:12,padding:"14px 16px",fontSize:13,color:"#c0d8c4",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{n.msg}</div>
        </div>
      ))}
      <div style={css.card}>
        <div style={css.cardTitle}>✍️ Custom Message</div>
        <textarea style={{...css.textarea,marginBottom:10}} rows={5} placeholder="Write your own message..." value={custom} onChange={e=>setCustom(e.target.value)}/>
        <button onClick={()=>copy(custom,"custom")} style={{...css.btn("primary"),width:"100%"}}>{copied==="custom"?"✓ Copied!":"Copy Message →"}</button>
      </div>
    </div>
  );
}

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const G2={bg:"#06080a",surface:"#0c1117",border:"rgba(96,165,250,0.12)",accent:"#60a5fa",text:"#dce8f5",muted:"#5a7a99",faint:"#0f1822"};
  const inp={width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${G2.border}`,borderRadius:10,color:G2.text,padding:"11px 14px",fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",outline:"none"};
  const steps=["Welcome","About You","Your Why","Your Goals","Review"];
  if(done) return (
    <div style={{minHeight:"100vh",background:G2.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",textAlign:"center",padding:24,fontFamily:"'DM Sans',sans-serif",color:G2.text}}>
      <div style={{fontSize:60,marginBottom:16}}>🎉</div>
      <div style={{fontSize:26,fontWeight:800,marginBottom:10}}>Application Submitted!</div>
      <div style={{fontSize:15,color:G2.muted,maxWidth:400,lineHeight:1.7,marginBottom:28}}>Thanks <strong style={{color:G2.accent}}>{form.name.split(" ")[0]}</strong>! The VOA admin will reach out via WhatsApp within 48 hours with your login PIN.</div>
      <button onClick={onBack} style={{background:G2.accent,color:"#06080a",border:"none",padding:"12px 28px",borderRadius:12,fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>← Back to Portal</button>
    </div>
  );
  return (
    <div style={{minHeight:"100vh",background:G2.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px",fontFamily:"'DM Sans',sans-serif",color:G2.text}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"3px",color:G2.accent,textTransform:"uppercase",marginBottom:6}}>Volunteers Organization Africa</div>
        <div style={{fontSize:30,fontWeight:800}}>Join REP</div>
      </div>
      {step>0&&step<5&&(
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:28}}>
          {steps.slice(1).map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center"}}>
              <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,
                background:step>i+1?G2.accent:step===i+1?G2.accent:"transparent",
                border:`2px solid ${step>=i+1?G2.accent:"rgba(96,165,250,0.2)"}`,
                color:step>=i+1?"#06080a":G2.muted}}>{step>i+1?"✓":i+1}</div>
              {i<steps.length-2&&<div style={{width:24,height:2,background:step>i+1?G2.accent:"rgba(96,165,250,0.15)",margin:"0 3px"}}/>}
            </div>
          ))}
        </div>
      )}
      <div style={{background:G2.surface,border:`1px solid ${G2.border}`,borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:520}}>
        {step===0&&(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:14}}>🌊</div>
            <div style={{fontSize:24,fontWeight:800,marginBottom:10}}>Ripple Effect Program</div>
            <div style={{fontSize:14,color:G2.muted,lineHeight:1.7,marginBottom:24}}>A small accountability group inside VOA. Commit to goals, read books together, and show up for the community.</div>
            <button onClick={()=>setStep(1)} style={{background:G2.accent,color:"#06080a",border:"none",padding:"13px 36px",borderRadius:12,fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Apply Now →</button>
          </div>
        )}
        {step===1&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>About You</div>
            {[{k:"name",l:"Full Name",p:"e.g. Amara Osei"},{k:"email",l:"Email",p:"you@email.com"},{k:"whatsapp",l:"WhatsApp Number",p:"+234 801 234 5678"},{k:"city",l:"City",p:"e.g. Lagos"},{k:"age",l:"Age",p:"e.g. 25",t:"number"},{k:"occupation",l:"Occupation",p:"e.g. Student, Developer…"}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>{f.l}</div>
                <input style={inp} type={f.t||"text"} placeholder={f.p} value={form[f.k]} onChange={e=>set(f.k,e.target.value)}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button onClick={()=>setStep(0)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(2)} disabled={!form.name||!form.email||!form.whatsapp||!form.city} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#06080a",fontFamily:"'DM Sans',sans-serif",fontWeight:800,opacity:(form.name&&form.email&&form.whatsapp&&form.city)?1:0.4}}>Continue →</button>
            </div>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Your Why</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>Why do you want to join REP? <span style={{color:"#f87171"}}>*</span></div>
            <textarea style={{...inp,resize:"vertical",marginBottom:4}} rows={5} placeholder="What drew you to REP? What do you hope to give and gain?" value={form.why} onChange={e=>set("why",e.target.value)}/>
            <div style={{fontSize:11,color:form.why.length>=40?G2.accent:G2.muted,textAlign:"right",marginBottom:14}}>{form.why.length} chars {form.why.length>=40?"✓":"(need 40+)"}</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>How did you hear about us?</div>
            <input style={{...inp,marginBottom:16}} placeholder="e.g. Friend referral, Instagram…" value={form.referral} onChange={e=>set("referral",e.target.value)}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(3)} disabled={form.why.length<40} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#06080a",fontFamily:"'DM Sans',sans-serif",fontWeight:800,opacity:form.why.length>=40?1:0.4}}>Continue →</button>
            </div>
          </div>
        )}
        {step===3&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Your Goals</div>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>List 2–4 goals for this cohort <span style={{color:"#f87171"}}>*</span></div>
            <textarea style={{...inp,resize:"vertical",marginBottom:14}} rows={6} placeholder={"1. Read 1 book per month\n2. Volunteer 8 hours/month\n3. Wake up at 6am daily"} value={form.goals} onChange={e=>set("goals",e.target.value)}/>
            <div style={{fontSize:11,color:G2.accent,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>I commit to showing up weekly <span style={{color:"#f87171"}}>*</span></div>
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {[{v:"yes",l:"✅ Yes, I commit"},{v:"no",l:"❌ Not sure yet"}].map(o=>(
                <button key={o.v} onClick={()=>set("commitment",o.v)} style={{flex:1,padding:"11px",borderRadius:12,cursor:"pointer",fontWeight:700,fontFamily:"'DM Sans',sans-serif",fontSize:13,
                  border:`1.5px solid ${form.commitment===o.v?G2.accent:"rgba(96,165,250,0.2)"}`,background:form.commitment===o.v?"rgba(96,165,250,0.1)":"transparent",color:form.commitment===o.v?G2.accent:G2.muted}}>{o.l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(2)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={()=>setStep(4)} disabled={!form.goals||form.commitment!=="yes"} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#06080a",fontFamily:"'DM Sans',sans-serif",fontWeight:800,opacity:(form.goals&&form.commitment==="yes")?1:0.4}}>Review →</button>
            </div>
          </div>
        )}
        {step===4&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:18}}>Review & Submit</div>
            {[{l:"Name",v:form.name},{l:"Email",v:form.email},{l:"WhatsApp",v:form.whatsapp},{l:"City",v:form.city},{l:"Age",v:form.age}].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
                <span style={{fontSize:12,color:G2.muted,fontWeight:600}}>{r.l}</span>
                <span style={{fontSize:13,fontWeight:700}}>{r.v}</span>
              </div>
            ))}
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginTop:14,marginBottom:14}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>WHY JOINING</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.6}}>{form.why}</div>
            </div>
            <div style={{background:G2.faint,borderRadius:12,padding:"12px 14px",marginBottom:18}}>
              <div style={{fontSize:11,color:G2.accent,fontWeight:700,marginBottom:6}}>GOALS</div>
              <div style={{fontSize:13,color:"#b0c8e0",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{form.goals}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(3)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:"transparent",color:G2.muted,fontFamily:"'DM Sans',sans-serif",fontWeight:700}}>← Back</button>
              <button onClick={async()=>{
                setSubmitting(true);
                try {
                  await onSubmit({...form});
                  setDone(true);
                } catch(e){ console.error(e); }
                setSubmitting(false);
              }} style={{flex:2,padding:"11px",borderRadius:12,border:"none",cursor:"pointer",background:G2.accent,color:"#06080a",fontFamily:"'DM Sans',sans-serif",fontWeight:800,opacity:submitting?0.6:1}}>
                {submitting?"Submitting…":"Submit Application 🌊"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Login ────────────────────────────────────────────────────────────────────
function LoginScreen({members,onLogin,onApply}) {
  const [selected,setSelected]=useState(null);
  const [pin,setPin]=useState("");
  const [error,setError]=useState("");
  const handleNum=n=>{
    if(pin.length>=4)return;
    const next=pin+n;
    setPin(next);
    if(next.length===4){
      setTimeout(()=>{
        if(selected.pin===next)onLogin(selected);
        else{setError("Wrong PIN. Try again.");setPin("");}
      },200);
    }
  };
  return (
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse 70% 60% at 50% 0%,rgba(74,222,128,0.08) 0%,transparent 70%),${G.bg}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'DM Sans',sans-serif",color:G.text}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:10,letterSpacing:"3px",color:G.accent,textTransform:"uppercase",marginBottom:6}}>Volunteers Organization Africa</div>
        <div style={{fontSize:32,fontWeight:800,letterSpacing:"-1px"}}>REP Portal</div>
        <div style={{fontSize:13,color:G.muted,marginTop:4}}>Ripple Effect Program</div>
      </div>
      <div style={{background:G.surface,border:`1px solid ${G.border}`,borderRadius:24,padding:"36px 30px",width:"100%",maxWidth:400}}>
        {!selected?(
          <>
            <div style={{fontSize:12,color:G.muted,marginBottom:14}}>Select your name to sign in:</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {members.map(m=>(
                <button key={m.id} onClick={()=>setSelected(m)} style={{display:"flex",alignItems:"center",gap:14,padding:"11px 14px",background:G.faint,border:`1px solid ${G.border}`,borderRadius:14,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",color:G.text}}>
                  <div style={css.avatar(m.color,34)}>{m.avatar}</div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontWeight:700,fontSize:14}}>{m.name}</div>
                    <div style={{fontSize:11,color:G.muted}}>{m.role==="admin"?"🛡 Admin":`🔥 ${m.streak}d streak`}</div>
                  </div>
                </button>
              ))}
            </div>
            <button onClick={onApply} style={{width:"100%",marginTop:16,padding:"12px",borderRadius:12,border:`1px solid rgba(74,222,128,0.25)`,background:"rgba(74,222,128,0.06)",color:G.accent,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              📝 Apply to Join REP →
            </button>
          </>
        ):(
          <>
            <button onClick={()=>{setSelected(null);setPin("");setError("");}} style={{background:"transparent",border:"none",color:G.muted,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,marginBottom:14,padding:0}}>← Back</button>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
              <div style={css.avatar(selected.color,42)}>{selected.avatar}</div>
              <div><div style={{fontSize:17,fontWeight:800}}>{selected.name}</div><div style={{fontSize:12,color:G.muted}}>Enter your 4-digit PIN</div></div>
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
              {[0,1,2,3].map(i=><div key={i} style={css.pinDot(i<pin.length)}/>)}
            </div>
            {error&&<div style={{color:"#fb923c",fontSize:12,textAlign:"center",marginBottom:12}}>{error}</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(
                <button key={i} disabled={n===""} onClick={()=>n==="⌫"?setPin(p=>p.slice(0,-1)):handleNum(String(n))}
                  style={{...css.numBtn,opacity:n===""?0:1}}>{n}</button>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Root App (Supabase-powered) ──────────────────────────────────────────────
function App() {
  const [member,setMember]=useState(null);
  const [tab,setTab]=useState("home");
  const [view,setView]=useState("login");
  const [goals,setGoals]=useState([]);
  const [members,setMembers]=useState([]);
  const [apps,setApps]=useState([]);
  const [loading,setLoading]=useState(true);

  // ── Load all data from Supabase on mount ──
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      try {
        const [mData,gData,aData]=await Promise.all([
          db.select("members",{order:"id"}),
          db.select("goals",{order:"id"}),
          db.select("applications",{order:"applied_at.desc"}),
        ]);
        setMembers(mData.map(m=>({...m,bookPct:m.book_pct||0,pin:m.pin||""})));
        setGoals(gData.map(g=>({...g,memberId:g.member_id,proofs:g.proofs||[]})));
        setApps(aData.map(a=>({...a,appliedAt:a.applied_at?.split("T")[0]||""})));
      } catch(e){ console.error("Load error",e); }
      setLoading(false);
    }
    loadAll();
  },[]);

  // ── Update goal in Supabase ──
  const updateGoal=async(u)=>{
    setGoals(gs=>gs.map(g=>g.id===u.id?u:g));
    await db.update("goals",{title:u.title,category:u.category,status:u.status,note:u.note,due:u.due},{id:u.id});
  };

  // ── Add goal to Supabase ──
  const addGoal=async(g)=>{
    const data=await db.insert("goals",{member_id:g.memberId,title:g.title,category:g.category,status:g.status,due:g.due,note:g.note||""});
    if(data) setGoals(gs=>[...gs,{...data,memberId:data.member_id,proofs:[]}]);
  };

  // ── Submit application to Supabase ──
  const submitApp=async(a)=>{
    try {
      const payload={
        name:a.name,
        email:a.email,
        whatsapp:a.whatsapp,
        city:a.city,
        age:parseInt(a.age)||0,
        occupation:a.occupation||"",
        why:a.why,
        goals:a.goals,
        referral:a.referral||"",
        commitment:a.commitment,
        status:"pending"
      };
      const data=await db.insert("applications",payload);
      if(data) setApps(as=>[{...data,appliedAt:data.applied_at?.split("T")[0]||""},...as]);
    } catch(e){
      alert("Error: "+e.message);
      throw e;
    }
  };

  // ── Approve / decline application ──
  const decideApp=async(id,status,pin)=>{
    setApps(as=>as.map(a=>a.id===id?{...a,status,assigned_pin:pin}:a));
    await db.update("applications",{status,assigned_pin:pin},{id:id});
  };

  // ── Update book progress ──
  const updateBookProgress=async(memberId,pct)=>{
    setMembers(ms=>ms.map(m=>m.id===memberId?{...m,bookPct:pct,book_pct:pct}:m));
    await db.update("members",{book_pct:pct},{id:memberId});
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'DM Sans',sans-serif",color:G.muted}}>
      <div style={{fontSize:40}}>🌊</div>
      <div style={{fontSize:14}}>Loading VOA REP Portal…</div>
    </div>
  );

  if(view==="apply") return <OnboardingFlow onSubmit={submitApp} onBack={()=>setView("login")}/>;
  if(!member) return <LoginScreen members={members} onLogin={m=>{setMember(m);setView("portal");setTab("home");}} onApply={()=>setView("apply")}/>;

  const isAdmin=member.role==="admin";
  const memberTabs=[{id:"home",label:"🏠 Home"},{id:"books",label:"📖 Book Club"}];

  return (
    <div style={css.root}>
      <div style={css.header}>
        <div>
          <div style={{fontSize:10,letterSpacing:"2px",color:G.accent,textTransform:"uppercase"}}>VOA · REP</div>
          <div style={{fontSize:15,fontWeight:800,lineHeight:1}}>Member Portal</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {!isAdmin&&memberTabs.map(n=>(
            <button key={n.id} style={css.navItem(tab===n.id)} onClick={()=>setTab(n.id)}>{n.label}</button>
          ))}
          <div style={{...css.avatar(member.color,30),cursor:"pointer",marginLeft:8}} onClick={()=>{setMember(null);setView("login");}} title="Sign out">{member.avatar}</div>
        </div>
      </div>
      {isAdmin
        ? <AdminView members={members} goals={goals} apps={apps} onUpdateGoal={updateGoal} onDecideApp={decideApp} setMembers={setMembers}/>
        : tab==="home"
          ? <MemberHome member={member} goals={goals} onUpdateGoal={updateGoal} onAddGoal={addGoal}/>
          : <BookClubTab member={member} members={members} setMembers={setMembers} onUpdateProgress={updateBookProgress}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
